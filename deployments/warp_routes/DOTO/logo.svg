<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background circle -->
  <circle cx="50" cy="50" r="50" fill="#000000"/>

  <!-- d bowl: white outer ring -->
  <circle cx="38" cy="55" r="23" fill="white"/>
  <!-- d bowl: black inner hole -->
  <circle cx="38" cy="55" r="13.5" fill="#000000"/>

  <!-- d ascending stem: thick stroke going up-right from right edge of bowl -->
  <path d="M 58 55 L 58 28 Q 60 22 66 22 L 70 22 L 70 32 L 65 32 L 63 34 L 63 55 Z" fill="white"/>

  <!-- Gap at top-right of bowl where stem begins (natural opening of the "d") -->
  <path d="M 56 42 L 64 35 L 68 40 L 60 47 Z" fill="#000000"/>

  <!-- Exclamation dot (bottom right) -->
  <circle cx="70" cy="72" r="5.5" fill="white"/>
</svg>

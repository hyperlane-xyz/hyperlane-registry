<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>OmniCoin (XOM) Icon - Blue</title>
  <desc>XOM monogram on a blue gradient coin</desc>

  <defs>
    <!-- Blue coin gradient -->
    <radialGradient id="blueCoin" cx="38%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0B1A3B"/>
    </radialGradient>

    <!-- Subtle rim shine -->
    <radialGradient id="blueRim" cx="50%" cy="50%" r="50%">
      <stop offset="86%" stop-color="transparent"/>
      <stop offset="93%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>

    <!-- Inner glow for the symbol -->
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <circle cx="260" cy="262" r="244" fill="rgba(0,0,40,0.2)"/>

  <!-- Coin disc -->
  <circle cx="256" cy="256" r="244" fill="url(#blueCoin)"/>

  <!-- Rim -->
  <circle cx="256" cy="256" r="244" fill="url(#blueRim)"/>

  <!-- XOM Symbol in white -->
  <g fill="none" stroke="#FFFFFF" stroke-width="35" stroke-linecap="round" stroke-linejoin="round" filter="url(#innerGlow)" opacity="0.95">
    <!-- O: Circle -->
    <circle cx="256" cy="256" r="178"/>

    <!-- X: Diagonal top-left to bottom-right -->
    <line x1="130.1" y1="130.1" x2="381.9" y2="381.9"/>

    <!-- X: Diagonal top-right to bottom-left -->
    <line x1="381.9" y1="130.1" x2="130.1" y2="381.9"/>

    <!-- M: Left vertical -->
    <line x1="130.1" y1="130.1" x2="130.1" y2="381.9"/>

    <!-- M: Right vertical -->
    <line x1="381.9" y1="130.1" x2="381.9" y2="381.9"/>
  </g>
</svg>
